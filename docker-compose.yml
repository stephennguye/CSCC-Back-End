# ============================================================
# AI Call Center Backend — Docker Compose
# Services: PostgreSQL, Redis, Backend API
# ============================================================

services:
  # ----------------------------------------------------------
  # PostgreSQL — primary durable store
  # ----------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: cscc_postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cscc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cscc_pass}
      POSTGRES_DB: ${POSTGRES_DB:-cscc_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cscc} -d ${POSTGRES_DB:-cscc_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ----------------------------------------------------------
  # Redis — ephemeral session state, rate limiting, pub/sub
  # ----------------------------------------------------------
  redis:
    image: redis:7.4-alpine
    container_name: cscc_redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ----------------------------------------------------------
  # Backend API — FastAPI application
  # ----------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # CPU default; override with nvidia/cuda:12.4.1-runtime-ubuntu22.04 for GPU
        BASE_IMAGE: python:3.12-slim
    container_name: cscc_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-cscc}:${POSTGRES_PASSWORD:-cscc_pass}@postgres:5432/${POSTGRES_DB:-cscc_db}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    volumes:
      - backend_data:/app/data

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  backend_data:
    driver: local
